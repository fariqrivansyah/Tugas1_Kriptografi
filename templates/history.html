<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>History Cryptography</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body class="bg-dark text-light">

<div class="container py-5">

    <!-- HEADER -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h1 class="fw-bold">

                <i class="fa-solid fa-clock-rotate-left text-info"></i>

                Encryption History

            </h1>

            <p class="text-secondary">

                Riwayat proses enkripsi & dekripsi

            </p>

        </div>

        <a href="/"
           class="btn btn-outline-info">

            <i class="fa-solid fa-arrow-left"></i>

            Back

        </a>

    </div>

    <!-- HISTORY -->

    {% if history %}

        {% for item in history|reverse %}

        <div class="card bg-secondary border-0 shadow-lg rounded-4 mb-4">

            <div class="card-body">

                <div class="d-flex justify-content-between mb-3">

                    <h4 class="text-info">

                        <i class="fa-solid fa-lock"></i>

                        {{ item.algorithm|upper }}

                    </h4>

                    <span class="badge bg-dark fs-6">

                        {{ item.mode }}

                    </span>

                </div>

                <hr class="border-light">

                <p>

                    <strong>Input Text:</strong>

                </p>

                <div class="alert alert-dark">

                    {{ item.text }}

                </div>

                <p>

                    <strong>Result:</strong>

                </p>

                <div class="alert alert-success">

                    {{ item.result }}

                </div>

            </div>

        </div>

        {% endfor %}

    {% else %}

        <div class="alert alert-warning">

            Belum ada history enkripsi/dekripsi.

        </div>

    {% endif %}

</div>

</body>
</html>
